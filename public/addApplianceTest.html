<!DOCTYPE html>
<html>
<head>
  <title>UtiliSee Add Appliance</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="login-container">
    <h1>UtiliSee</h1>
    <p>Appliance</p>

    <form id="add-appliance-form">
    <div style="display: flex; align-items: center; justify-content: right; gap: 25px;">
      <p>Name: </p>
      <input type="text" id="name" style="height: 10px;">
    </div>

    <div style="display: flex; align-items: center; justify-content: right; gap: 25px;">
      <p>Wattage: </p>
      <input type="number" id="wattage" style="height: 10px;">
    </div>

    <div style="display: flex; align-items: center; justify-content: right; gap: 25px;">
      <p>Hourly usage: </p>
      <input type="number" id="hour-usage" style="height: 10px;">
    </div>

    <div style="display: flex; align-items: center; justify-content: right; gap: 25px;">
      <p>Usage date: </p>
      <input type="date" id="usage-date" style="height: 10px;">
    </div>
    
    <br>
    <button type="submit">Add Appliance</button> 
    </form>
    

  <script src="app.js"></script>

</body>
</html>
