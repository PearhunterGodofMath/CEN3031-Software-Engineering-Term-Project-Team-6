<!DOCTYPE html>
<html>
<head>
  <title>UtiliSee Add Appliance</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="utilities-container">
    <h1>UtiliSee</h1>
    <p>Get Appliance Information</p>

    <form id="get-appliance-form">
    <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: right; gap: 25px;">
      <p>Name: </p>
      <input type="text" id="name" style="height: 10px;">
      <p>Start Date: </p>
      <input type="date" id="start-date">
      <p>End Date: </p>
      <input type="date" id="end-date">
    </div>
    
    <button type="submit">Get Appliance</button> 
    </form>
    <br>
    <div style="display: flex; gap: 30px;">
      <p>Current electricity price: </p>
      <p id="electricity-price"></p>
    </div>
    <div style="display: flex; gap: 30px;">
      <p>Wattage Average: </p>
      <p id="wattage-average"></p>
    </div>
    <ul id="appliance-list"></ul>
    
  </div>
  <script src="app.js"></script>

</body>
</html>
