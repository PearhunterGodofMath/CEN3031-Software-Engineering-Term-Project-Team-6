<!DOCTYPE html>
<html>
<head>
  <title>UtiliSee Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="utilities-container">
    <div class="utilities-header">
      <button type="button" class="settings-button" onclick="window.location.href='accountSettings.html'">
        Settings
      </button>
    </div>

    <img src="images/logo.png" alt="UtiliSee Logo" class="logo">
    <p>Get Appliance Information</p>

    <form id="get-appliance-form">
    <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: right; gap: 25px;">
      <p>Name: </p>
      <input type="text" id="name" style="height: 10px;">
      <p>Start Date: </p>
      <input type="date" id="start-date">
      <p>End Date: </p>
      <input type="date" id="end-date">
    </div>
    
    <button type="submit">Show Appliance Table</button> 
    </form>
    <br>
    <div style="display: flex; gap: 30px;">
      <p>Current electricity price: </p>
      <p id="electricity-price"></p>
    </div>
      <div style="display: flex; gap: 30px; flex-wrap: wrap;">
      <input type="number" id="electricity-price-input" placeholder="New price:" style="width: 50%;">
      <button id="electricity-price-btn" onclick="SetElectricityPrice()" style="width: auto;">Submit</button>
    </div>
    <div style="display: flex; gap: 30px; height: 30px;">
      <p style="flex-grow: 1; text-align: left;">Wattage Average: </p>
      <p id="wattage-average" style="font-weight: bold; text-align: right;"></p>
    </div>
    <div style="display: flex; gap: 30px; height: 30px;">
      <p style="flex-grow: 1; text-align: left;">Date Range Average (DRA): </p>
      <p id="cost-average" style="font-weight: bold; text-align: right;"></p>
    </div>
    <div style="display: flex; gap: 30px; height: 30px;">
      <p style="flex-grow: 1; text-align: left;">Daily Cost Average (DCA): </p>
      <p id="day-cost-average" style="font-weight: bold; text-align: right;"></p>
    </div>
    <hr/>
    <button type="button" onclick="window.location.href='addAppliance.html'">
      Add Appliance
    </button>
    <hr/>
    <table id="appliance-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Wattage</th>
          <th>Hourly Usage</th>
          <th>Usage Date</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="appliance-table-body">
      </tbody>
    </table>

    
  </div>
  <script src="app.js"></script>

</body>
</html>
